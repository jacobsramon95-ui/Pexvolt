<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cc1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8a1111;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Hexagon Frame -->
  <path d="M100 15L173.2 57.5V142.5L100 185L26.8 142.5V57.5L100 15Z" stroke="url(#grad1)" stroke-width="4" fill="none" opacity="0.5"/>
  
  <!-- Inner Hexagon -->
  <path d="M100 25L164.5 62.5V137.5L100 175L35.5 137.5V62.5L100 25Z" fill="#060d1a" stroke="url(#grad1)" stroke-width="8"/>
  
  <!-- Lightning Bolt (Main Symbol) -->
  <path d="M120 50L80 115H110L90 165L130 95H100L120 50Z" fill="url(#grad1)" filter="url(#glow)"/>
  
  <!-- Decorative Tech Elements -->
  <circle cx="100" cy="25" r="3" fill="#cc1a1a"/>
  <circle cx="164.5" cy="62.5" r="3" fill="#cc1a1a"/>
  <circle cx="164.5" cy="137.5" r="3" fill="#cc1a1a"/>
  <circle cx="100" cy="175" r="3" fill="#cc1a1a"/>
  <circle cx="35.5" cy="137.5" r="3" fill="#cc1a1a"/>
  <circle cx="35.5" cy="62.5" r="3" fill="#cc1a1a"/>
  
  <!-- Connecting Lines -->
  <path d="M100 25V40M164.5 62.5L150 70M164.5 137.5L150 130M100 175V160M35.5 137.5L50 130M35.5 62.5L50 70" stroke="#cc1a1a" stroke-width="2" opacity="0.4"/>
</svg>
