<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <radialGradient id="globeGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#2a0a0a"/>
      <stop offset="50%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <radialGradient id="glowRed" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3300" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#cc1100" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6644"/>
      <stop offset="100%" stop-color="#cc2200"/>
    </radialGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#ddddee"/>
      <stop offset="60%" stop-color="#cc2200"/>
      <stop offset="100%" stop-color="#880000"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4422"/>
      <stop offset="50%" stop-color="#cc1100"/>
      <stop offset="100%" stop-color="#ff6644"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer red ring / orbit -->
  <ellipse cx="250" cy="250" rx="185" ry="75" fill="none" stroke="url(#ringGrad)" stroke-width="18" transform="rotate(-25 250 250)" opacity="0.9"/>
  <ellipse cx="250" cy="250" rx="185" ry="75" fill="none" stroke="#cc1100" stroke-width="6" transform="rotate(-25 250 250)" opacity="0.6"/>

  <!-- Main dark globe -->
  <circle cx="250" cy="230" r="155" fill="url(#globeGrad)"/>
  <circle cx="250" cy="230" r="155" fill="none" stroke="#1a0505" stroke-width="3"/>
  <!-- Rim highlight -->
  <circle cx="250" cy="230" r="155" fill="none" stroke="#330000" stroke-width="8"/>
  <circle cx="250" cy="230" r="150" fill="none" stroke="#550000" stroke-width="3"/>

  <!-- Circuit board lines -->
  <!-- Left side circuits -->
  <g stroke="#cc2200" stroke-width="1.5" fill="none" opacity="0.7">
    <line x1="155" y1="200" x2="185" y2="200"/>
    <line x1="185" y1="200" x2="185" y2="175"/>
    <line x1="185" y1="175" x2="210" y2="175"/>
    <line x1="155" y1="235" x2="190" y2="235"/>
    <line x1="190" y1="235" x2="190" y2="215"/>
    <line x1="140" y1="255" x2="175" y2="255"/>
    <line x1="175" y1="255" x2="175" y2="270"/>
    <line x1="175" y1="270" x2="195" y2="270"/>
    <line x1="155" y1="285" x2="180" y2="285"/>
    <line x1="170" y1="210" x2="170" y2="225"/>
    <line x1="160" y1="220" x2="185" y2="220"/>
  </g>
  <!-- Right side circuits -->
  <g stroke="#cc2200" stroke-width="1.5" fill="none" opacity="0.7">
    <line x1="345" y1="195" x2="310" y2="195"/>
    <line x1="310" y1="195" x2="310" y2="175"/>
    <line x1="310" y1="175" x2="288" y2="175"/>
    <line x1="345" y1="230" x2="308" y2="230"/>
    <line x1="308" y1="230" x2="308" y2="210"/>
    <line x1="355" y1="255" x2="322" y2="255"/>
    <line x1="322" y1="255" x2="322" y2="270"/>
    <line x1="322" y1="270" x2="305" y2="270"/>
    <line x1="340" y1="280" x2="315" y2="280"/>
    <line x1="330" y1="215" x2="330" y2="230"/>
  </g>

  <!-- Circuit dots (glowing) -->
  <g filter="url(#glow)">
    <!-- Left dots -->
    <circle cx="155" cy="200" r="5" fill="url(#dotGlow)"/>
    <circle cx="185" cy="175" r="4" fill="url(#dotGlow)"/>
    <circle cx="210" cy="175" r="5" fill="#ff4422"/>
    <circle cx="155" cy="235" r="5" fill="url(#dotGlow)"/>
    <circle cx="190" cy="215" r="4" fill="#ff4422"/>
    <circle cx="140" cy="255" r="5" fill="url(#dotGlow)"/>
    <circle cx="195" cy="270" r="4" fill="#ff4422"/>
    <circle cx="155" cy="285" r="5" fill="url(#dotGlow)"/>
    <circle cx="160" cy="220" r="4" fill="#ff4422"/>
    <!-- Right dots -->
    <circle cx="345" cy="195" r="5" fill="url(#dotGlow)"/>
    <circle cx="310" cy="175" r="4" fill="#ff4422"/>
    <circle cx="288" cy="175" r="5" fill="url(#dotGlow)"/>
    <circle cx="345" cy="230" r="5" fill="url(#dotGlow)"/>
    <circle cx="308" cy="210" r="4" fill="#ff4422"/>
    <circle cx="355" cy="255" r="5" fill="url(#dotGlow)"/>
    <circle cx="305" cy="270" r="4" fill="#ff4422"/>
    <circle cx="340" cy="280" r="5" fill="url(#dotGlow)"/>
    <circle cx="330" cy="215" r="4" fill="#ff4422"/>
  </g>

  <!-- Lightning bolt (main element) -->
  <polygon points="272,70 220,230 255,230 228,390 310,195 272,195 300,70"
           fill="url(#boltGrad)" stroke="#222" stroke-width="2" filter="url(#strongGlow)"/>
  <!-- Bolt highlight -->
  <polygon points="272,70 248,160 265,160 272,70"
           fill="rgba(255,255,255,0.4)"/>

  <!-- Red glow under bolt -->
  <ellipse cx="250" cy="310" rx="40" ry="20" fill="url(#glowRed)" opacity="0.6"/>

  <!-- Bottom metallic ring segment -->
  <ellipse cx="250" cy="350" rx="120" ry="35" fill="none" stroke="#555566" stroke-width="12" opacity="0.5"/>
  <ellipse cx="250" cy="350" rx="120" ry="35" fill="none" stroke="#8888aa" stroke-width="4" opacity="0.4"/>

  <!-- Text: PEXVOLT -->
  <text x="250" y="435" 
        font-family="Arial Black, Arial, sans-serif" 
        font-weight="900" 
        font-size="72" 
        fill="#cc2200"
        text-anchor="middle"
        letter-spacing="2">PEXVOLT</text>

  <!-- Decorative lines around ENGINEERING -->
  <line x1="60" y1="462" x2="145" y2="462" stroke="#334466" stroke-width="2"/>
  <line x1="355" y1="462" x2="440" y2="462" stroke="#334466" stroke-width="2"/>
  <!-- Small decorators -->
  <polygon points="143,458 148,462 143,466" fill="#334466"/>
  <polygon points="357,458 352,462 357,466" fill="#334466"/>

  <!-- Text: ENGINEERING -->
  <text x="250" y="470" 
        font-family="Arial, sans-serif" 
        font-weight="600" 
        font-size="28" 
        fill="#334466"
        text-anchor="middle"
        letter-spacing="6">ENGINEERING</text>
</svg>
