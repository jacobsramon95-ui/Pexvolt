<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="globeGrad" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#2a0808"/>
      <stop offset="45%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#040410"/>
    </radialGradient>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6644"/>
      <stop offset="100%" stop-color="#cc2200"/>
    </radialGradient>
    <radialGradient id="glowCenter" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#ff2200" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#cc0000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="boltGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="25%" stop-color="#eeeeee"/>
      <stop offset="55%" stop-color="#dd3311"/>
      <stop offset="100%" stop-color="#770000"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff5533"/>
      <stop offset="40%" stop-color="#cc1100"/>
      <stop offset="100%" stop-color="#ff6644"/>
    </linearGradient>
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#666688"/>
      <stop offset="50%" stop-color="#222233"/>
      <stop offset="100%" stop-color="#888899"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="boltGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Red orbital ring (behind globe) -->
  <ellipse cx="200" cy="205" rx="168" ry="60"
           fill="none" stroke="url(#ringGrad)" stroke-width="16"
           transform="rotate(-22 200 205)"/>
  <ellipse cx="200" cy="205" rx="168" ry="60"
           fill="none" stroke="#ff3311" stroke-width="5"
           transform="rotate(-22 200 205)" opacity="0.5"/>

  <!-- Main dark globe -->
  <circle cx="200" cy="195" r="140" fill="url(#globeGrad)"/>
  <!-- Globe border -->
  <circle cx="200" cy="195" r="140" fill="none" stroke="#1a0808" stroke-width="5"/>
  <circle cx="200" cy="195" r="135" fill="none" stroke="#440000" stroke-width="2"/>

  <!-- Red glow center -->
  <circle cx="200" cy="230" r="80" fill="url(#glowCenter)"/>

  <!-- Circuit lines - LEFT -->
  <g stroke="#dd2200" stroke-width="1.8" fill="none" opacity="0.75">
    <line x1="100" y1="165" x2="135" y2="165"/>
    <line x1="100" y1="165" x2="100" y2="145"/>
    <line x1="100" y1="145" x2="118" y2="145"/>
    <line x1="118" y1="165" x2="118" y2="178"/>
    <line x1="118" y1="178" x2="138" y2="178"/>
    <line x1="90"  y1="195" x2="130" y2="195"/>
    <line x1="108" y1="195" x2="108" y2="210"/>
    <line x1="90"  y1="220" x2="125" y2="220"/>
    <line x1="108" y1="220" x2="108" y2="235"/>
    <line x1="100" y1="248" x2="130" y2="248"/>
    <line x1="115" y1="235" x2="115" y2="248"/>
  </g>

  <!-- Circuit lines - RIGHT -->
  <g stroke="#dd2200" stroke-width="1.8" fill="none" opacity="0.75">
    <line x1="300" y1="160" x2="262" y2="160"/>
    <line x1="300" y1="160" x2="300" y2="142"/>
    <line x1="300" y1="142" x2="282" y2="142"/>
    <line x1="282" y1="160" x2="282" y2="175"/>
    <line x1="282" y1="175" x2="265" y2="175"/>
    <line x1="310" y1="192" x2="270" y2="192"/>
    <line x1="292" y1="192" x2="292" y2="207"/>
    <line x1="310" y1="218" x2="272" y2="218"/>
    <line x1="293" y1="218" x2="293" y2="235"/>
    <line x1="300" y1="248" x2="268" y2="248"/>
    <line x1="282" y1="235" x2="282" y2="248"/>
  </g>

  <!-- Glowing circuit dots - LEFT -->
  <g filter="url(#glow)">
    <circle cx="100" cy="165" r="5.5" fill="#ff4422"/>
    <circle cx="100" cy="145" r="4.5" fill="#ff5533"/>
    <circle cx="118" cy="145" r="5" fill="#ff3311"/>
    <circle cx="138" cy="178" r="5" fill="#ff4422"/>
    <circle cx="90"  cy="195" r="5.5" fill="#ff3311"/>
    <circle cx="108" cy="210" r="4.5" fill="#ff5533"/>
    <circle cx="90"  cy="220" r="5.5" fill="#ff4422"/>
    <circle cx="108" cy="235" r="4.5" fill="#ff3311"/>
    <circle cx="100" cy="248" r="5" fill="#ff4422"/>
  </g>

  <!-- Glowing circuit dots - RIGHT -->
  <g filter="url(#glow)">
    <circle cx="300" cy="160" r="5.5" fill="#ff4422"/>
    <circle cx="300" cy="142" r="4.5" fill="#ff5533"/>
    <circle cx="282" cy="142" r="5" fill="#ff3311"/>
    <circle cx="265" cy="175" r="5" fill="#ff4422"/>
    <circle cx="310" cy="192" r="5.5" fill="#ff3311"/>
    <circle cx="292" cy="207" r="4.5" fill="#ff5533"/>
    <circle cx="310" cy="218" r="5.5" fill="#ff4422"/>
    <circle cx="293" cy="235" r="4.5" fill="#ff3311"/>
    <circle cx="300" cy="248" r="5" fill="#ff4422"/>
  </g>

  <!-- Lightning bolt -->
  <polygon points="225,52 170,190 208,190 178,338 268,172 228,172 258,52"
           fill="url(#boltGrad)" stroke="#111" stroke-width="2"
           filter="url(#boltGlow)"/>
  <!-- Bolt top highlight -->
  <polygon points="225,52 205,130 218,130 225,52"
           fill="rgba(255,255,255,0.45)"/>
  <!-- Bolt left edge highlight -->
  <polygon points="225,52 208,190 215,190 230,60"
           fill="rgba(255,255,255,0.15)"/>

  <!-- Bottom metallic rim -->
  <ellipse cx="200" cy="305" rx="105" ry="28"
           fill="none" stroke="url(#rimGrad)" stroke-width="10" opacity="0.55"/>
  <ellipse cx="200" cy="305" rx="105" ry="28"
           fill="none" stroke="#9999bb" stroke-width="3" opacity="0.35"/>

  <!-- Red ring front segment (over globe) -->
  <path d="M 75 235 Q 200 330 325 235"
        fill="none" stroke="url(#ringGrad)" stroke-width="14" opacity="0.85"
        stroke-linecap="round"/>
</svg>
